<!DOCTYPE html>
<html>
<head>
    <title>Multilingual Support Translator</title>
</head>
<body>
    <h2>Customer Support Translator</h2>

    <form method="POST">
        <textarea name="query" rows="5" cols="50"
            placeholder="Enter your query in any language..." required></textarea>

        <br><br>

        <label>Select language to translate into:</label>
        <select name="language">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="fr">French</option>
            <option value="es">Spanish</option>
            <option value="de">German</option>
            <option value="ja">Japanese</option>
        </select>

        <br><br>

        <button type="submit">Translate</button>
    </form>

    {% if translated %}
        <h3>Translated Text:</h3>
        <p>{{ translated }}</p>

        <h3>Support Response:</h3>
        <p>{{ reply }}</p>
    {% endif %}

</body>
</html>
